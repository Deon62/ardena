# Extensionless URLs for nginx
# Include this inside your server { } block, or add the try_files line to your existing location / block.
#
# Option A: If you have a single "location /" block, add this try_files:
#
#   location / {
#       try_files $uri $uri/ $uri.html =404;
#   }
#
# Option B: Or use this full snippet:
#
#   location / {
#       try_files $uri $uri/ $uri.html =404;
#   }
#
# This makes nginx look for:
#   1. Exact file ($uri)
#   2. Directory ($uri/)
#   3. File with .html ($uri.html)  <- so /privacy serves privacy.html
#   4. Otherwise 404
